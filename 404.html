<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · HTML Previewer</title>
  <link rel="icon" type="image/svg+xml" href="media/images/logos/html5.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --accent:  #58a6ff;
      --red:     #f85149;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --sans:    'Inter', sans-serif;
      --mono:    'JetBrains Mono', monospace;
    }
    [data-theme="light"] {
      --bg:      #f6f8fa;
      --surface: #ffffff;
      --border:  #d0d7de;
      --text:    #1f2328;
      --muted:   #57606a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background .15s, color .15s;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      color: var(--text);
    }
    .nav-logo img { width: 20px; height: 20px; }
    .nav-home {
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      border-radius: 6px;
      transition: filter .1s;
    }
    .nav-home:hover { filter: brightness(1.12); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .error-wrap { max-width: 480px; }

    .error-code {
      font-family: var(--mono);
      font-size: clamp(80px, 15vw, 120px);
      font-weight: 600;
      line-height: 1;
      color: var(--red);
      opacity: .18;
      letter-spacing: -4px;
      user-select: none;
      margin-bottom: -16px;
    }

    .error-icon {
      font-size: 52px;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 700;
      letter-spacing: -.4px;
      margin-bottom: 10px;
      color: var(--text);
    }

    .error-msg {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .error-msg code {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text);
    }

    .error-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      border: 1px solid transparent;
      transition: filter .1s, transform .1s;
    }
    .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      background: var(--surface);
      color: var(--text);
      border-radius: 7px;
      border: 1px solid var(--border);
      transition: border-color .1s, color .1s, transform .1s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

    /* ── SUGGESTED LINKS ── */
    .suggestions {
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }
    .suggestions p {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .suggestion-links {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .suggestion-links a {
      padding: 5px 12px;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      text-decoration: none;
      transition: color .1s, border-color .1s;
    }
    .suggestion-links a:hover { color: var(--accent); border-color: var(--accent); }

    /* ── FOOTER ── */
    footer {
      padding: 16px 24px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href=".">
    <img src="media/images/logos/html5.svg" alt="" />
    HTML Previewer
  </a>
  <a class="nav-home" href=".">← Home</a>
</nav>

<main>
  <div class="error-wrap">
    <div class="error-code" aria-hidden="true">404</div>
    <span class="error-icon">🔍</span>
    <h1>Page not found</h1>
    <p class="error-msg">
      The page at <code id="err-path">/</code> doesn't exist.<br />
      It may have been moved, deleted, or you may have mistyped the URL.
    </p>
    <div class="error-actions">
      <a href="." class="btn-primary">← Go home</a>
      <a href="app" class="btn-ghost">▶ Open App</a>
    </div>
    <div class="suggestions">
      <p>Or try one of these</p>
      <div class="suggestion-links">
        <a href=".">Landing page</a>
        <a href="app">App</a>
        <a href="app#sample&preview">Sample preview</a>
        <a href="https://github.com/MrLiPx/html-previewer" target="_blank" rel="noopener">GitHub</a>
        <a href="https://github.com/MrLiPx/html-previewer/issues" target="_blank" rel="noopener">Report issue</a>
      </div>
    </div>
  </div>
</main>

<footer>
  HTML Previewer · MIT License · Made by <a href="https://github.com/MrLiPx" target="_blank" rel="noopener">Mr Li Px</a>
</footer>

<script>
  // Show the actual path that 404'd
  const p = location.pathname;
  const el = document.getElementById('err-path');
  if (el && p) el.textContent = p;

  // Apply saved/OS theme
  (function () {
    try {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        return;
      }
    } catch (_) {}
    if (window.matchMedia?.('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
</body>
</html>
